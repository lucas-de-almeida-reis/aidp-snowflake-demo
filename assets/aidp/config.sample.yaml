# ╔══════════════════════════════════════════════════════════════════╗
# ║  aidp-snowflake-demo — Notebook runtime configuration            ║
# ║                                                                  ║
# ║  Copy this file to `config.yaml` (same directory) and fill in    ║
# ║  your values. Notebooks read this file at runtime; the path to   ║
# ║  the file is set at the top of each notebook (CONFIG_PATH).      ║
# ║                                                                  ║
# ║  ⚠ DO NOT COMMIT a populated config.yaml — it is .gitignored.   ║
# ║                                                                  ║
# ║  Sensitive values (sfUser, sfPassword) are NOT in this file.    ║
# ║  They live in AIDP secrets — the `credential` key below names    ║
# ║  the AIDP credential containing the `user` and `password` keys.  ║
# ║                                                                  ║
# ║  Dev and prod use the SAME Snowflake account (same sfUrl), with  ║
# ║  logical separation via database name only — RAPPI_DEV vs        ║
# ║  RAPPI_PROD. Schema (BRONZE) and table (ORDER_DIMENSIONS) are    ║
# ║  identical inside each DB; see assets/snowflake/*.sql.           ║
# ╚══════════════════════════════════════════════════════════════════╝


dev:
  # Per-notebook row caps. 0 = no limit; positive int = LIMIT N.
  # bronze : applied by 01 to the Snowflake pull (SQL LIMIT, pushed down).
  # silver : applied by 02 to the silver read before gold aggregation.
  # Convention: tiny ints in dev for fast iteration, 0 in prod.
  test_rows:
    bronze: 1000
    silver: 100

  # Snowflake source — bronze. `credential` is the AIDP credential
  # name (Workspace → Credential store) holding the two keys
  # `user` and `password`. Everything else is a Snowflake Spark
  # connector option that goes straight into `.options(**snow)`.
  snowflake:
    credential:  snowflake_dev
    sfUrl:       https://<account>.<region>.snowflakecomputing.com
    sfDatabase:  RAPPI_DEV
    sfSchema:    BRONZE
    sfWarehouse: COMPUTE_WH

  # Bronze table to read.
  source:
    table: ORDER_DIMENSIONS

  # Silver target — AIDP default Spark catalog (Delta).
  # Leave `catalog` empty so the notebook uses just `schema.table`
  # (2-part name). AIDP's Spark runs single-catalog by default; a
  # 3-part name like `silver.silver.order_dimensions` fails parsing.
  silver:
    catalog: ''
    schema:  silver
    table:   order_dimensions

  # Gold target — ADW/ALH via the external-catalog mount.
  gold:
    catalog: gold
    schema:  admin
    table:   orders_vertical_performance


prod:
  test_rows:
    bronze: 0   # full run — no limit
    silver: 0   # full run — no limit

  snowflake:
    credential:  snowflake_prod
    sfUrl:       https://<account>.<region>.snowflakecomputing.com   # same account as dev
    sfDatabase:  RAPPI_PROD
    sfSchema:    BRONZE
    sfWarehouse: COMPUTE_WH

  source:
    table: ORDER_DIMENSIONS

  silver:
    catalog: silver
    schema:  default
    table:   order_dimensions

  gold:
    catalog: gold
    schema:  admin
    table:   orders_vertical_performance
